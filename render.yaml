services:
  - type: web
    name: payflow-api
    env: node
    buildCommand: npm install && npm run build -w packages/payflow-dashboard
    startCommand: node packages/payflow-server/dist/index.js
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PAYFLOW_MODE
        value: local
      - key: PORT
        value: "3001"
      - key: STRIPE_SECRET_KEY
        value: sk_test_placeholder
      - key: PAYPAL_CLIENT_ID
        value: test
      - key: PAYPAL_SECRET
        value: test
